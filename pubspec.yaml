name: banabana_b2b
description: BanaBana Business — B2B platform for producers, wholesalers and vendors
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # HTTP
  dio: ^5.4.3+1

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.0

  # Models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Images
  cached_network_image: ^3.3.1
  image_picker: ^1.1.2

  # Icons
  material_symbols_icons: ^4.2719.3

  # Charts
  fl_chart: ^0.68.0

  # Biometric
  local_auth: ^2.3.0

  # Utils
  intl: ^0.19.0
  google_fonts: ^6.2.1

  # Splash
  flutter_native_splash: ^2.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  build_runner: ^2.4.11
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3
  mocktail: ^1.0.4
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/images/icon.png"
  min_sdk_android: 21
  web:
    generate: false

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/images/splash.png
  color_dark: "#121212"
  image_dark: assets/images/splash.png
  android: true
  ios: true
  android_12:
    image: assets/images/icon.png
    color: "#FFFFFF"
    color_dark: "#121212"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
