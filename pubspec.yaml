name: banabana_b2b
description: "BanaBana B2B — plateforme commerce agricole"
publish_to: 'none'

version: 1.0.0+3

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # State management & routing
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.8.1

  # Storage & networking
  shared_preferences: ^2.3.5
  dio: ^5.8.0+1

  # UI
  cupertino_icons: ^1.0.8
  material_symbols_icons: ^4.2810.0
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  fl_chart: ^0.70.2
  flutter_native_splash: ^2.4.6

  # Data / serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Utils
  intl: ^0.20.2
  image_picker: ^1.1.2
  flutter_secure_storage: ^9.2.4
  local_auth: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  freezed: ^2.5.7
  build_runner: ^2.4.15
  json_serializable: ^6.9.5
  riverpod_generator: ^2.6.2

flutter:
  uses-material-design: true

  assets:
    - assets/images/
